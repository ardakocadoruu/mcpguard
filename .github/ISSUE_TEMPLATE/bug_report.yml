name: Bug Report
description: Report unexpected behavior or a crash in mcpguard
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible so we can reproduce and fix the issue quickly.

        > **Security note:** If your bug involves secrets or private package contents that were scanned, please **redact** them before submitting.

  - type: input
    id: version
    attributes:
      label: mcpguard version
      description: Run `mcpguard --version` to find this.
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: package
    attributes:
      label: Package or path that was scanned
      description: Optional. The PyPI package name/version or local path passed to mcpguard. Redact any sensitive values.
      placeholder: "e.g. some-mcp-package@1.2.3  or  ./path/to/local/project"
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect mcpguard to do?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste any error messages, tracebacks, or mcpguard output here. Redact secrets.
      render: text
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 15.4  /  Ubuntu 24.04  /  Windows 11"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Run `python --version` to find this.
      placeholder: "e.g. 3.11.9"
    validations:
      required: true
